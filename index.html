<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Uni-World Services Co. — Global Business Registration and Corporate Services</title>
<meta name="description" content="Since 1993. Hong Kong, China, Korea - Company Formation, Accounting, Tax, Visa, Strategic Consulting. 100+ professionals across 6 offices.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Noto+Sans+KR:wght@300;400;500;600;700;800;900&family=Noto+Sans+SC:wght@300;400;500;700&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
/*═══════════════════════════════════════════
  UNI-WORLD SERVICES — FULL WEBSITE
  React-style SPA with Router + i18n
═══════════════════════════════════════════*/

/* ── RESET ── */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth;font-size:16px}
body{font-family:'Inter','Noto Sans KR','Noto Sans SC','Noto Sans JP',system-ui,sans-serif;color:#1e293b;background:#f0f8ff;line-height:1.7;overflow-x:hidden;-webkit-font-smoothing:antialiased}
a{text-decoration:none;color:inherit;transition:all .25s}
ul{list-style:none}
img{max-width:100%;display:block}
button{font-family:inherit;cursor:pointer;border:none;background:none}

/* ── VARIABLES ── */
:root{
  --navy:#0c2340;
  --navy-light:#163a5f;
  --blue:#1a6fb5;
  --blue-light:#2d8fd5;
  --gold:#c8a45a;
  --gold-light:#dbb96e;
  --dark:#0f172a;
  --text:#1e293b;
  --text-2:#475569;
  --text-3:#94a3b8;
  --bg:#f0f8ff;
  --bg-2:#e3f2fd;
  --bg-3:#d0ebfb;
  --border:#e2e8f0;
  --shadow-xs:0 1px 2px rgba(0,0,0,.05);
  --shadow-sm:0 2px 8px rgba(0,0,0,.06);
  --shadow-md:0 8px 30px rgba(0,0,0,.08);
  --shadow-lg:0 20px 60px rgba(0,0,0,.1);
  --shadow-xl:0 25px 80px rgba(0,0,0,.14);
  --r-sm:8px;--r-md:12px;--r-lg:16px;--r-xl:24px;
  --ease:cubic-bezier(.4,0,.2,1);
  --max-w:1240px;
}

/* ── LAYOUT UTILS ── */
.container{max-width:var(--max-w);margin:0 auto;padding:0 32px}
.section{padding:100px 0}
@media(max-width:768px){.section{padding:64px 0}.container{padding:0 20px}}

/* ── TYPOGRAPHY ── */
.label{display:inline-flex;align-items:center;gap:8px;font-size:.75rem;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:var(--gold);margin-bottom:16px}
.label::before{content:'';width:32px;height:2px;background:var(--gold)}
.heading-xl{font-size:clamp(2.4rem,5.5vw,4rem);font-weight:900;line-height:1.1;letter-spacing:-.02em}
.heading-lg{font-size:clamp(1.8rem,4vw,2.8rem);font-weight:800;line-height:1.2;letter-spacing:-.01em}
.heading-md{font-size:clamp(1.2rem,2.5vw,1.5rem);font-weight:700;line-height:1.3}
.text-lg{font-size:1.1rem;color:var(--text-2);line-height:1.8;max-width:640px}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;gap:8px;padding:14px 32px;border-radius:var(--r-md);font-weight:700;font-size:.92rem;transition:all .3s var(--ease);letter-spacing:.3px;position:relative;overflow:hidden}
.btn-primary{background:var(--navy);color:#fff}
.btn-primary:hover{background:var(--navy-light);transform:translateY(-2px);box-shadow:0 8px 25px rgba(12,35,64,.3)}
.btn-gold{background:var(--gold);color:var(--navy)}
.btn-gold:hover{background:var(--gold-light);transform:translateY(-2px);box-shadow:0 8px 25px rgba(200,164,90,.4)}
.btn-outline{border:2px solid var(--border);color:var(--text);background:transparent}
.btn-outline:hover{border-color:var(--navy);color:var(--navy);background:rgba(12,35,64,.03)}
.btn-white{background:#fff;color:var(--navy)}
.btn-white:hover{background:rgba(255,255,255,.9);transform:translateY(-2px);box-shadow:0 8px 30px rgba(0,0,0,.15)}
.btn-ghost{border:2px solid rgba(255,255,255,.35);color:#fff;background:transparent}
.btn-ghost:hover{border-color:#fff;background:rgba(255,255,255,.08)}
.btn svg,.btn .arrow{transition:transform .3s var(--ease)}
.btn:hover .arrow{transform:translateX(4px)}

/* ── TOP BAR ── */
.topbar{background:var(--dark);color:rgba(255,255,255,.65);font-size:.8rem;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.06)}
.topbar .container{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
.topbar-left{display:flex;align-items:center;gap:6px}
.topbar-left .gold-badge{color:var(--gold);font-weight:700}
.topbar-right{display:flex;align-items:center;gap:20px}
.topbar a{color:rgba(255,255,255,.75);transition:color .2s}
.topbar a:hover{color:var(--gold)}
.lang-switcher{position:relative}
.lang-btn{display:flex;align-items:center;gap:6px;color:rgba(255,255,255,.8);font-size:.8rem;font-weight:600;cursor:pointer;padding:4px 10px;border-radius:6px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1)}
.lang-btn:hover{background:rgba(255,255,255,.12)}
.lang-dropdown{position:absolute;top:calc(100% + 8px);right:0;background:var(--bg);border:1px solid var(--border);border-radius:var(--r-md);box-shadow:var(--shadow-lg);min-width:180px;z-index:9999;display:none;overflow:hidden}
.lang-dropdown.open{display:block}
.lang-dropdown a{display:flex;align-items:center;gap:10px;padding:10px 16px;font-size:.85rem;color:var(--text);font-weight:500}
.lang-dropdown a:hover{background:var(--bg-2);color:var(--navy)}
.lang-dropdown a.active{background:var(--bg-3);color:var(--navy);font-weight:700}

/* ── HEADER ── */
.header{position:sticky;top:0;z-index:1000;background:rgba(255,255,255,.98);backdrop-filter:blur(24px) saturate(1.2);border-bottom:1px solid transparent;transition:all .3s var(--ease)}
.header.scrolled{border-color:var(--border);box-shadow:var(--shadow-xs)}
.header .container{display:flex;align-items:center;justify-content:space-between;height:76px}
.logo{display:flex;align-items:center;gap:12px}
.logo-mark{width:42px;height:42px;background:linear-gradient(135deg,var(--navy),var(--blue));border-radius:10px;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.logo-mark::after{content:'';position:absolute;top:0;right:0;width:50%;height:50%;background:linear-gradient(135deg,transparent 50%,rgba(200,164,90,.3));border-radius:0 10px 0 0}
.logo-mark span{color:#fff;font-weight:900;font-size:1rem;letter-spacing:-.5px;position:relative;z-index:2}
.logo-text{font-weight:800;font-size:1.15rem;color:var(--navy);line-height:1.2}
.logo-text small{display:block;font-size:.65rem;font-weight:500;color:var(--text-3);letter-spacing:1.5px;text-transform:uppercase}
.nav{display:flex;align-items:center;gap:4px}
.nav a{padding:8px 16px;font-size:.88rem;font-weight:600;color:var(--text-2);border-radius:var(--r-sm);transition:all .2s}
.nav a:hover,.nav a.active{color:var(--navy);background:var(--bg-2)}
.nav a.active{font-weight:700}
.nav-cta{margin-left:12px;padding:10px 24px !important;background:var(--navy) !important;color:#fff !important;border-radius:var(--r-md) !important;font-weight:700 !important}
.nav-cta:hover{background:var(--navy-light) !important;transform:translateY(-1px)}

/* Mobile Nav */
.mobile-toggle{display:none;flex-direction:column;gap:5px;padding:8px;cursor:pointer}
.mobile-toggle span{display:block;width:22px;height:2px;background:var(--text);border-radius:2px;transition:all .3s}
.mobile-nav{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(255,255,255,.98);backdrop-filter:blur(20px);z-index:9998;flex-direction:column;align-items:center;justify-content:center;gap:8px}
.mobile-nav.open{display:flex}
.mobile-nav a{font-size:1.2rem;font-weight:700;padding:12px 32px;color:var(--text);border-radius:var(--r-md)}
.mobile-nav a:hover{background:var(--bg-2);color:var(--navy)}
.mobile-close{position:absolute;top:24px;right:24px;font-size:1.8rem;color:var(--text);padding:8px}

/* ── HERO ── */
.hero{position:relative;min-height:92vh;display:flex;align-items:center;background:linear-gradient(160deg,#0c2340 0%,#163a5f 45%,#1a6fb5 100%);overflow:hidden}
.hero::before{content:'';position:absolute;top:-30%;right:-15%;width:900px;height:900px;background:radial-gradient(circle,rgba(200,164,90,.1) 0%,transparent 65%);border-radius:50%}
.hero::after{content:'';position:absolute;bottom:-40%;left:-10%;width:700px;height:700px;background:radial-gradient(circle,rgba(26,111,181,.15) 0%,transparent 65%);border-radius:50%}
.hero .container{position:relative;z-index:2;display:grid;grid-template-columns:1.1fr .9fr;gap:80px;align-items:center}
.hero-content{color:#fff}
.hero-badges{display:flex;gap:12px;margin-bottom:28px;flex-wrap:wrap}
.hero-badge{display:inline-flex;align-items:center;gap:8px;padding:8px 16px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);border-radius:50px;font-size:.8rem;font-weight:600;backdrop-filter:blur(10px)}
.hero-badge .dot{width:7px;height:7px;border-radius:50%;background:#4ade80;animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.4}}
.hero-badge .gold{color:var(--gold)}
.hero h1{margin-bottom:24px}
.hero h1 .gold-text{background:linear-gradient(135deg,var(--gold),var(--gold-light),#e8d08a);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hero .subtitle{font-size:1.15rem;color:rgba(255,255,255,.7);line-height:1.9;margin-bottom:40px;max-width:520px}
.hero-buttons{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:48px}
.hero-trust{display:flex;gap:32px;flex-wrap:wrap}
.hero-trust-item{display:flex;align-items:center;gap:10px;color:rgba(255,255,255,.55);font-size:.82rem}
.hero-trust-item svg{width:18px;height:18px;opacity:.5}
.hero-trust-item strong{color:rgba(255,255,255,.9);font-weight:700}

/* Hero Right — Leadership Card */
.hero-right{display:flex;flex-direction:column;gap:20px}
.leader-card{background:rgba(255,255,255,.06);backdrop-filter:blur(24px);border:1px solid rgba(255,255,255,.1);border-radius:var(--r-xl);padding:36px 32px;position:relative;overflow:hidden}
.leader-card::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:linear-gradient(90deg,var(--gold),var(--blue),var(--gold))}
.leader-photo{width:100px;height:100px;border-radius:50%;background:linear-gradient(135deg,var(--navy-light),var(--blue));border:3px solid rgba(200,164,90,.4);display:flex;align-items:center;justify-content:center;margin:0 auto 20px;position:relative;overflow:hidden}
.leader-photo .placeholder{color:rgba(255,255,255,.4);font-size:.7rem;text-align:center;line-height:1.3}
.leader-card h3{color:#fff;font-size:1.2rem;font-weight:800;text-align:center;margin-bottom:4px}
.leader-card .role{text-align:center;color:var(--gold);font-size:.85rem;font-weight:600;margin-bottom:16px}
.title-list{display:flex;flex-direction:column;gap:8px}
.title-item{display:flex;align-items:flex-start;gap:10px;padding:10px 14px;background:rgba(255,255,255,.04);border-radius:var(--r-sm);border-left:3px solid var(--gold);font-size:.82rem;color:rgba(255,255,255,.8);line-height:1.5}
.title-item .icon{font-size:1rem;min-width:20px}

/* Stats strip */
.stats-strip{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
.stat-box{background:rgba(255,255,255,.05);backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,.08);border-radius:var(--r-lg);padding:20px;text-align:center;transition:all .3s var(--ease)}
.stat-box:hover{background:rgba(255,255,255,.1);transform:translateY(-3px)}
.stat-box .num{font-size:1.8rem;font-weight:900;color:#fff;margin-bottom:2px}
.stat-box .num span{color:var(--gold)}
.stat-box .txt{font-size:.75rem;color:rgba(255,255,255,.5)}

/* ── HERO LOGOS ── */
.hero-logos{display:flex;flex-wrap:wrap;justify-content:center;gap:16px;max-width:800px;margin:0 auto}
.hero-logo-item{display:flex;flex-direction:column;align-items:center;gap:6px;width:90px;transition:all .3s var(--ease)}
.hero-logo-item:hover{transform:translateY(-3px)}
.hero-logo-img{width:72px;height:72px;border-radius:14px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:.55rem;color:rgba(255,255,255,.3);backdrop-filter:blur(10px);transition:all .3s;overflow:hidden;line-height:1.3;text-align:center}
.hero-logo-item:hover .hero-logo-img{background:rgba(255,255,255,.15);border-color:rgba(200,164,90,.4)}
.hero-logo-img img{width:100%;height:100%;object-fit:contain;padding:8px}
.hero-logo-name{font-size:.65rem;color:rgba(255,255,255,.45);font-weight:600;text-align:center;white-space:nowrap}
@media(max-width:768px){.hero-logo-item{width:70px}.hero-logo-img{width:56px;height:56px;border-radius:10px}.hero-logo-name{font-size:.55rem}}

/* ── CREDENTIALS BAR ── */
.cred-bar{background:var(--bg-2);border-top:1px solid var(--border);border-bottom:1px solid var(--border);padding:24px 0;overflow:hidden}
.cred-bar .container{display:flex;align-items:center;justify-content:center;gap:40px;flex-wrap:wrap}
.cred-item{display:flex;align-items:center;gap:10px;color:var(--text-2);font-size:.85rem;font-weight:600;white-space:nowrap}
.cred-item .cred-icon{width:36px;height:36px;border-radius:8px;background:var(--bg);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:1.1rem}

/* ── ABOUT ── */
.about-grid{display:grid;grid-template-columns:1fr 1fr;gap:60px;align-items:center;margin-top:48px}
.about-img{width:100%;aspect-ratio:4/3;background:linear-gradient(135deg,var(--bg-2),var(--bg-3));border-radius:var(--r-xl);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.about-img .placeholder{color:var(--text-3);font-size:.85rem;text-align:center;line-height:1.6}
.about-img::after{content:'';position:absolute;bottom:0;left:0;right:0;height:40%;background:linear-gradient(transparent,rgba(12,35,64,.04))}
.about-content h2{margin-bottom:20px}
.about-content p{color:var(--text-2);line-height:1.9;margin-bottom:16px}
.about-highlight{background:var(--bg-2);border-left:4px solid var(--gold);padding:20px 24px;border-radius:0 var(--r-md) var(--r-md) 0;margin:24px 0}
.about-highlight p{font-weight:600;color:var(--navy);margin:0;font-size:.95rem}

/* ── SERVICES ── */
.services{background:var(--bg-2)}
.services-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:24px;margin-top:48px}
.service-card{background:var(--bg);border:1px solid var(--border);border-radius:var(--r-lg);padding:36px 28px;transition:all .35s var(--ease);position:relative;overflow:hidden;cursor:pointer}
.service-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--navy),var(--blue));transform:scaleX(0);transform-origin:left;transition:transform .4s var(--ease)}
.service-card:hover::before{transform:scaleX(1)}
.service-card:hover{box-shadow:var(--shadow-md);transform:translateY(-6px);border-color:transparent}
.svc-icon{width:56px;height:56px;background:linear-gradient(135deg,var(--navy),var(--blue));border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:1.5rem;margin-bottom:20px;color:#fff;transition:all .3s}
.service-card:hover .svc-icon{transform:scale(1.05);box-shadow:0 6px 20px rgba(26,111,181,.25)}
.service-card h3{font-size:1.1rem;font-weight:700;margin-bottom:8px;color:var(--text)}
.service-card p{font-size:.88rem;color:var(--text-2);line-height:1.7;margin-bottom:16px}
.svc-tags{display:flex;flex-wrap:wrap;gap:6px}
.svc-tag{padding:4px 10px;background:var(--bg-2);border-radius:6px;font-size:.72rem;font-weight:700;color:var(--navy);letter-spacing:.3px}
.svc-link{display:inline-flex;align-items:center;gap:6px;font-size:.85rem;font-weight:700;color:var(--blue);margin-top:12px;transition:all .2s}
.svc-link:hover{gap:10px;color:var(--navy)}

/* ── PROCESS ── */
.process{background:var(--dark);color:#fff;position:relative;overflow:hidden}
.process::before{content:'';position:absolute;top:0;right:0;width:50%;height:100%;background:linear-gradient(90deg,transparent,rgba(26,111,181,.05))}
.process .heading-lg{color:#fff}
.process .text-lg{color:rgba(255,255,255,.55)}
.steps{display:grid;grid-template-columns:repeat(4,1fr);gap:32px;margin-top:60px;position:relative}
.steps::before{content:'';position:absolute;top:36px;left:10%;width:80%;height:2px;background:linear-gradient(90deg,var(--gold),var(--blue),var(--gold));opacity:.2}
.step{text-align:center;position:relative}
.step-num{width:72px;height:72px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--gold-light));display:flex;align-items:center;justify-content:center;font-size:1.4rem;font-weight:900;color:var(--navy);margin:0 auto 24px;position:relative;z-index:2;box-shadow:0 6px 24px rgba(200,164,90,.25);transition:all .3s}
.step:hover .step-num{transform:scale(1.1);box-shadow:0 8px 32px rgba(200,164,90,.4)}
.step h3{font-size:1rem;font-weight:700;margin-bottom:8px}
.step p{font-size:.85rem;color:rgba(255,255,255,.5);line-height:1.7;max-width:220px;margin:0 auto}

/* ── LEADERSHIP DETAIL ── */
.leadership{background:linear-gradient(160deg,var(--navy) 0%,var(--navy-light) 100%);color:#fff}
.lead-grid{display:grid;grid-template-columns:1fr 1.3fr;gap:60px;align-items:center;margin-top:48px}
.lead-photo-wrap{text-align:center}
.lead-photo-lg{width:260px;height:260px;border-radius:50%;background:linear-gradient(135deg,rgba(255,255,255,.06),rgba(255,255,255,.02));border:4px solid rgba(200,164,90,.3);margin:0 auto 24px;display:flex;align-items:center;justify-content:center;position:relative}
.lead-photo-lg .placeholder{color:rgba(255,255,255,.3);font-size:.85rem;text-align:center}
.lead-name{font-size:1.6rem;font-weight:900;margin-bottom:4px}
.lead-role{color:var(--gold);font-size:.95rem;font-weight:600;margin-bottom:8px}
.lead-subtitle{color:rgba(255,255,255,.5);font-size:.85rem}
.lead-info h2{margin-bottom:20px}
.lead-info p{color:rgba(255,255,255,.7);line-height:1.9;margin-bottom:16px;font-size:.95rem}
.positions-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:24px}
.position-card{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:var(--r-md);padding:18px 16px;display:flex;align-items:flex-start;gap:12px;transition:all .3s}
.position-card:hover{background:rgba(255,255,255,.1);transform:translateY(-2px)}
.position-card .pos-icon{width:40px;height:40px;min-width:40px;border-radius:10px;background:rgba(200,164,90,.15);display:flex;align-items:center;justify-content:center;font-size:1.1rem}
.position-card h4{font-size:.85rem;font-weight:700;margin-bottom:2px}
.position-card p{font-size:.75rem;color:rgba(255,255,255,.5)}

/* ── TRUST / NUMBERS ── */
.trust{background:var(--bg-2)}
.trust-nums{display:grid;grid-template-columns:repeat(4,1fr);gap:32px;margin-top:48px}
.trust-num{text-align:center;padding:32px 20px}
.trust-num .big{font-size:3.2rem;font-weight:900;color:var(--navy);line-height:1}
.trust-num .big span{color:var(--gold)}
.trust-num .lbl{color:var(--text-2);font-size:.9rem;margin-top:8px}

/* Testimonials */
.testimonials{display:grid;grid-template-columns:repeat(3,1fr);gap:24px;margin-top:48px}
.testi{background:var(--bg);border:1px solid var(--border);border-radius:var(--r-lg);padding:32px 28px;position:relative;transition:all .3s}
.testi:hover{box-shadow:var(--shadow-md);transform:translateY(-3px)}
.testi::before{content:'\201C';position:absolute;top:16px;left:22px;font-size:3.5rem;color:var(--gold);opacity:.25;font-family:Georgia,serif;line-height:1}
.testi .stars{color:var(--gold);font-size:.9rem;margin-bottom:12px;letter-spacing:2px}
.testi p{font-size:.9rem;color:var(--text-2);line-height:1.8;margin-bottom:16px;position:relative;z-index:2}
.testi-author{display:flex;align-items:center;gap:12px}
.testi-avatar{width:42px;height:42px;border-radius:50%;background:linear-gradient(135deg,var(--navy),var(--blue));display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:.85rem}
.testi-name{font-weight:700;font-size:.88rem}
.testi-role{font-size:.78rem;color:var(--text-3)}

/* ── NEWS ── */
.news-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:24px;margin-top:48px}
.news-card{background:var(--bg);border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden;transition:all .3s;cursor:pointer}
.news-card:hover{box-shadow:var(--shadow-md);transform:translateY(-4px)}
.news-img{width:100%;aspect-ratio:16/9;background:var(--bg-3);display:flex;align-items:center;justify-content:center;color:var(--text-3);font-size:.8rem;position:relative}
.news-img .cat{position:absolute;top:12px;left:12px;padding:4px 12px;background:var(--navy);color:#fff;border-radius:6px;font-size:.7rem;font-weight:700;letter-spacing:.5px}
.news-body{padding:24px}
.news-date{font-size:.78rem;color:var(--text-3);margin-bottom:8px}
.news-card h3{font-size:1rem;font-weight:700;margin-bottom:8px;line-height:1.4}
.news-card p{font-size:.85rem;color:var(--text-2);line-height:1.7}

/* ── INNOVATION SECTION ── */
.innovation{background:linear-gradient(135deg,var(--bg-2),#fff);border-top:1px solid var(--border)}
.inno-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:24px;margin-top:48px}
.inno-card{background:var(--bg);border:1px solid var(--border);border-radius:var(--r-lg);padding:32px 24px;text-align:center;transition:all .3s}
.inno-card:hover{box-shadow:var(--shadow-md);transform:translateY(-4px);border-color:var(--gold)}
.inno-icon{width:64px;height:64px;border-radius:16px;background:linear-gradient(135deg,rgba(200,164,90,.1),rgba(200,164,90,.05));display:flex;align-items:center;justify-content:center;font-size:1.8rem;margin:0 auto 20px;transition:all .3s}
.inno-card:hover .inno-icon{background:linear-gradient(135deg,var(--gold),var(--gold-light));color:var(--navy)}
.inno-card h3{font-size:1.05rem;font-weight:700;margin-bottom:8px}
.inno-card p{font-size:.85rem;color:var(--text-2);line-height:1.7}

/* ── CTA ── */
.cta{background:linear-gradient(135deg,var(--navy),var(--blue));padding:80px 0;text-align:center;color:#fff;position:relative;overflow:hidden}
.cta .btn-white{display:inline-flex;align-items:center;gap:8px;padding:16px 40px;background:#fff;color:var(--navy);border-radius:50px;font-weight:700;font-size:1rem;transition:all .3s;box-shadow:0 4px 20px rgba(0,0,0,.15);letter-spacing:.3px}
.cta .btn-white:hover{background:#f8f9fa;transform:translateY(-3px);box-shadow:0 8px 30px rgba(0,0,0,.2)}
.cta .btn-ghost{display:inline-flex;align-items:center;gap:8px;padding:16px 40px;background:transparent;color:#fff;border-radius:50px;border:2px solid rgba(255,255,255,.5);font-weight:700;font-size:1rem;transition:all .3s;letter-spacing:.3px}
.cta .btn-ghost:hover{background:rgba(255,255,255,.1);border-color:#fff;transform:translateY(-3px)}
.cta::before{content:'';position:absolute;top:-40%;right:-15%;width:500px;height:500px;background:radial-gradient(circle,rgba(200,164,90,.12),transparent 65%);border-radius:50%}
.cta h2{position:relative;z-index:2;margin-bottom:16px}
.cta p{position:relative;z-index:2;color:rgba(255,255,255,.7);font-size:1.05rem;margin-bottom:36px;max-width:540px;margin-left:auto;margin-right:auto}
.cta-buttons{position:relative;z-index:2;display:flex;gap:16px;justify-content:center;flex-wrap:wrap}

/* ── CONTACT PAGE ── */
.contact-grid{display:grid;grid-template-columns:1fr 1fr;gap:48px;margin-top:48px}
.contact-info-cards{display:flex;flex-direction:column;gap:16px}
.ci-card{display:flex;gap:16px;padding:24px;background:var(--bg-2);border-radius:var(--r-md);border:1px solid var(--border)}
.ci-icon{width:48px;height:48px;min-width:48px;border-radius:12px;background:linear-gradient(135deg,var(--navy),var(--blue));display:flex;align-items:center;justify-content:center;font-size:1.2rem;color:#fff}
.ci-card h4{font-size:.9rem;font-weight:700;margin-bottom:4px}
.ci-card p{font-size:.85rem;color:var(--text-2);line-height:1.6}
.contact-form{background:var(--bg);border:1px solid var(--border);border-radius:var(--r-lg);padding:36px 32px}
.form-group{margin-bottom:20px}
.form-group label{display:block;font-size:.85rem;font-weight:600;margin-bottom:6px;color:var(--text)}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:12px 16px;border:1px solid var(--border);border-radius:var(--r-sm);font-size:.9rem;color:var(--text);background:var(--bg);transition:all .2s;font-family:inherit}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(26,111,181,.08)}
.form-group textarea{min-height:120px;resize:vertical}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px}

/* ── FOOTER ── */
.footer{background:var(--dark);color:rgba(255,255,255,.6);padding:64px 0 32px}
.footer-grid{display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:48px;margin-bottom:48px}
.footer-brand .logo{margin-bottom:16px}
.footer-brand .logo-text{color:#fff}
.footer-brand .logo-text small{color:rgba(255,255,255,.35)}
.footer-brand p{font-size:.88rem;line-height:1.7;margin-bottom:20px}
.footer-social{display:flex;gap:10px}
.footer-social a{width:38px;height:38px;border-radius:10px;background:rgba(255,255,255,.06);display:flex;align-items:center;justify-content:center;font-size:1rem;transition:all .25s}
.footer-social a:hover{background:var(--gold);color:var(--navy)}
.footer-col h4{color:#fff;font-size:.88rem;font-weight:700;margin-bottom:16px;letter-spacing:.5px}
.footer-col a{display:block;font-size:.85rem;padding:5px 0;transition:color .2s}
.footer-col a:hover{color:var(--gold)}
.footer-bottom{border-top:1px solid rgba(255,255,255,.06);padding-top:24px;display:flex;justify-content:space-between;align-items:center;font-size:.8rem;flex-wrap:wrap;gap:12px}
.footer-bottom a{margin-left:20px}
.footer-bottom a:hover{color:var(--gold)}

/* ── FLOATING ── */
.floating{position:fixed;bottom:28px;right:28px;z-index:999;display:flex;flex-direction:column;gap:10px}
.float-btn{width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.3rem;box-shadow:var(--shadow-md);transition:all .3s}
.float-btn:hover{transform:scale(1.12)}
.fl-kakao{background:#fee500;color:#391b1b}
.fl-wechat{background:#07c160;color:#fff}
.fl-phone{background:var(--navy);color:#fff}
.fl-top{background:#fff;color:var(--text);border:1px solid var(--border)}

/* ── VIDEO EMBED ── */
.video-wrap{position:relative;width:100%;border-radius:var(--r-lg);overflow:hidden;box-shadow:var(--shadow-lg);aspect-ratio:16/9;background:#000}
.video-wrap iframe{position:absolute;top:0;left:0;width:100%;height:100%;border:0}
.video-caption{text-align:center;margin-top:12px;font-size:.82rem;color:rgba(255,255,255,.5)}

/* ── TEAM SLIDER ── */
.team-slider{position:relative;overflow:hidden;border-radius:var(--r-xl);background:var(--bg-3);border:1px solid var(--border);max-height:320px}
.team-track{display:flex;transition:transform .6s var(--ease)}
.team-slide{min-width:100%;height:260px;display:flex;align-items:center;justify-content:center;background:var(--bg-3);position:relative;flex-shrink:0}
.team-slide .placeholder{color:var(--text-3);font-size:.85rem;text-align:center;line-height:1.6;padding:20px}
.team-nav{position:absolute;top:50%;transform:translateY(-50%);width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,.9);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:1rem;z-index:5;transition:all .2s;box-shadow:var(--shadow-sm)}
.team-nav:hover{background:var(--navy);color:#fff;border-color:var(--navy)}
.team-nav.prev{left:12px}
.team-nav.next{right:12px}
.team-controls{display:flex;align-items:center;justify-content:center;gap:12px;margin-top:16px;padding:12px 0}
.team-dots{display:flex;justify-content:center;gap:8px}
.team-dot{width:10px;height:10px;border-radius:50%;background:var(--border);cursor:pointer;transition:all .2s}
.team-dot.active{background:var(--navy);width:28px;border-radius:5px}
.team-ctrl-btn{width:36px;height:36px;border-radius:50%;background:var(--bg);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:.9rem;cursor:pointer;transition:all .2s}
.team-ctrl-btn:hover{background:var(--navy);color:#fff;border-color:var(--navy)}

/* ── AWARDS GALLERY ── */
.awards{background:var(--bg-2);border-top:1px solid var(--border)}
.awards-slider{position:relative;margin-top:40px;overflow:hidden}
.awards-track{display:flex;gap:20px;transition:transform .5s var(--ease)}
.award-card{min-width:280px;background:var(--bg);border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden;flex-shrink:0;transition:all .3s}
.award-card:hover{box-shadow:var(--shadow-md);transform:translateY(-4px)}
.award-img{width:100%;aspect-ratio:4/3;background:var(--bg-3);display:flex;align-items:center;justify-content:center;color:var(--text-3);font-size:.8rem;text-align:center;line-height:1.5;padding:16px;position:relative;overflow:hidden}
.award-img::after{content:'';position:absolute;inset:0;background:linear-gradient(transparent 60%,rgba(0,0,0,.03))}
.award-body{padding:16px 20px}
.award-body h4{font-size:.9rem;font-weight:700;margin-bottom:4px}
.award-body p{font-size:.78rem;color:var(--text-3)}
.slider-controls{display:flex;justify-content:center;gap:12px;margin-top:24px}
.slider-btn{width:44px;height:44px;border-radius:50%;background:var(--bg);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:1.1rem;transition:all .2s;cursor:pointer}
.slider-btn:hover{background:var(--navy);color:#fff;border-color:var(--navy)}
.slider-dots{display:flex;align-items:center;gap:8px}
.slider-dot{width:8px;height:8px;border-radius:50%;background:var(--border);cursor:pointer;transition:all .2s}
.slider-dot.active{background:var(--navy);width:24px;border-radius:4px}

/* ── LOGO SLIDER ── */
.logo-slider{overflow:hidden;padding:32px 0;position:relative}
.logo-slider::before,.logo-slider::after{content:'';position:absolute;top:0;width:80px;height:100%;z-index:2;pointer-events:none}
.logo-slider::before{left:0;background:linear-gradient(90deg,var(--bg-2),transparent)}
.logo-slider::after{right:0;background:linear-gradient(-90deg,var(--bg-2),transparent)}
.logo-track{display:flex;gap:48px;animation:logoScroll 25s linear infinite;width:max-content}
.logo-track:hover{animation-play-state:paused}
@keyframes logoScroll{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
/* logo-item overridden below */

/* ── PARTNERS PAGE ── */
.partners-hero{background:linear-gradient(160deg,var(--dark),var(--navy));padding:80px 0;text-align:center;color:#fff}
.partner-cats{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin:40px 0 32px}
.pcat-btn{padding:8px 20px;border-radius:50px;font-size:.82rem;font-weight:700;background:var(--bg-2);color:var(--text-2);border:1px solid var(--border);cursor:pointer;transition:all .25s}
.pcat-btn.active,.pcat-btn:hover{background:var(--navy);color:#fff;border-color:var(--navy)}
.partners-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:20px;margin-top:24px}
.partner-card{background:var(--bg);border:1px solid var(--border);border-radius:var(--r-lg);padding:28px 20px;text-align:center;transition:all .3s;cursor:pointer}
.partner-card:hover{box-shadow:var(--shadow-md);transform:translateY(-4px);border-color:var(--blue)}
.partner-logo{width:64px;height:64px;border-radius:14px;background:var(--bg-2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;margin:0 auto 14px;font-size:1.6rem;transition:all .3s}
.partner-card:hover .partner-logo{background:linear-gradient(135deg,var(--navy),var(--blue));color:#fff;border-color:transparent}
.partner-card h4{font-size:.9rem;font-weight:700;margin-bottom:4px}
.partner-card p{font-size:.78rem;color:var(--text-3);line-height:1.5;margin-bottom:10px}
.partner-link{font-size:.78rem;font-weight:700;color:var(--blue);display:inline-flex;align-items:center;gap:4px}
.partner-link:hover{color:var(--navy)}
@media(max-width:1024px){.partners-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:768px){.partners-grid{grid-template-columns:1fr}.award-card{min-width:240px}.awards-8-grid{grid-template-columns:repeat(2,1fr) !important}}
@media(max-width:480px){.awards-8-grid{grid-template-columns:1fr !important}}

/* ── PAGE TRANSITIONS ── */
.page{animation:pageIn .4s var(--ease)}
@keyframes pageIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

/* ── SCROLL ANIMATION ── */
.reveal{opacity:0;transform:translateY(30px);transition:all .7s var(--ease)}
.reveal.visible{opacity:1;transform:translateY(0)}

/* ── RESPONSIVE ── */
@media(max-width:1024px){
  .hero .container{grid-template-columns:1fr;text-align:center}
  .hero .subtitle{margin:0 auto 40px}
  .hero-buttons{justify-content:center}
  .hero-trust{justify-content:center}
  .hero-right{max-width:480px;margin:0 auto}
  .services-grid{grid-template-columns:repeat(2,1fr)}
  .about-grid{grid-template-columns:1fr}
  .lead-grid{grid-template-columns:1fr}
  .lead-photo-wrap{order:-1}
  .footer-grid{grid-template-columns:1fr 1fr}
  .contact-grid{grid-template-columns:1fr}
}
@media(max-width:768px){
  .nav{display:none}
  .mobile-toggle{display:flex}
  .topbar .container{font-size:.72rem}
  .topbar-right{gap:12px}
  .services-grid{grid-template-columns:1fr}
  .steps{grid-template-columns:repeat(2,1fr)}
  .steps::before{display:none}
  .trust-nums{grid-template-columns:repeat(2,1fr)}
  .testimonials{grid-template-columns:1fr}
  .news-grid{grid-template-columns:1fr}
  .inno-grid{grid-template-columns:1fr}
  .stats-strip{grid-template-columns:repeat(2,1fr)}
  .positions-grid{grid-template-columns:1fr}
  .footer-grid{grid-template-columns:1fr;gap:32px}
  .hero-badges{justify-content:center}
  .cred-bar .container{gap:20px}
  .form-row{grid-template-columns:1fr}
}

/* ── LOGO SLIDER IMAGES ── */
.logo-item{display:flex;align-items:center;justify-content:center;min-width:150px;height:64px;background:#fff;border:1px solid var(--border);border-radius:var(--r-sm);padding:10px 20px;transition:all .25s;cursor:pointer}
.logo-item img{max-height:40px;max-width:120px;width:auto;object-fit:contain;filter:grayscale(25%);transition:all .3s;display:block}
.logo-item:hover img{filter:none}
.logo-item:hover{border-color:var(--navy);box-shadow:var(--shadow-sm);transform:translateY(-2px)}

/* ── ABOUT MEDIA GRID ── */
.about-media-grid{display:grid;grid-template-columns:2fr 1fr;gap:20px;margin-top:32px}
.about-portrait-wrap{display:grid;grid-template-columns:1fr 1fr;gap:12px;min-height:0}
.about-portrait-img{width:100%;border-radius:var(--r-lg);object-fit:cover;height:100%}
@media(max-width:768px){.about-media-grid{grid-template-columns:1fr}.about-portrait-wrap{grid-template-rows:unset;grid-template-columns:1fr 1fr;height:auto}.about-portrait-img{height:180px}}

/* ── HERO CLEAN ── */
.hero-clean-badge{display:inline-flex;align-items:center;gap:8px;padding:7px 16px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:50px;font-size:.78rem;font-weight:600;backdrop-filter:blur(10px);margin-bottom:28px}
.hero-divider{width:60px;height:3px;background:linear-gradient(90deg,var(--gold),var(--gold-light));border-radius:2px;margin:24px auto}

</style>

// ── STATE ──
let lang = localStorage.getItem('uw_lang') || 'ko';
let currentPage = 'home';
let langOpen = false;

function t(key){ return T[lang][key] || T.en[key] || key; }
function nl2br(s){ return (s||'').replace(/\n/g,'<br>'); }

// ── ROUTER ──
function navigate(page, e){
  if(e) e.preventDefault();
  currentPage = page;
  window.location.hash = '#/' + (page === 'home' ? '' : page);
  render();
  window.scrollTo({top:0,behavior:'smooth'});
}

function parseHash(){
  const h = window.location.hash.replace('#/','');
  return h || 'home';
}

window.addEventListener('hashchange', ()=>{
  currentPage = parseHash();
  render();
});

// ── LANGUAGE ──
function setLang(l){
  lang = l;
  localStorage.setItem('uw_lang', l);
  langOpen = false;
  render();
}
function toggleLang(){ langOpen = !langOpen; render(); }

// ── RENDER ──
function render(){
  const app = document.getElementById('app');
  app.innerHTML = renderTopbar() + renderHeader() + renderPage() + renderFooter() + renderFloating();
  initEvents();
  initScrollReveal();
}

function renderTopbar(){
  return `<div class="topbar"><div class="container"><div class="topbar-left"><span class="gold-badge">★</span> <span>${t('topbar_since')} — ${t('topbar_exp')}</span></div><div class="topbar-right"><a href="mailto:${t('topbar_email')}">✉ ${t('topbar_email')}</a><a href="tel:${t('topbar_phone')}">☎ ${t('topbar_phone')}</a><div class="lang-switcher"><button class="lang-btn" onclick="toggleLang()">${T[lang]._flag} ${T[lang]._name} ▾</button><div class="lang-dropdown ${langOpen?'open':''}">${Object.keys(T).map(k=>`<a href="#" class="${k===lang?'active':''}" onclick="event.preventDefault();setLang('${k}')">${T[k]._flag} ${T[k]._name}</a>`).join('')}</div></div></div></div></div>`;
}

function renderHeader(){
  const pages = ['home','about','services','leadership','partners'];
  const labels = [t('nav_home'),t('nav_about'),t('nav_services'),t('nav_leadership'),t('nav_partners')];
  return `<header class="header" id="mainHeader"><div class="container"><a href="#/" onclick="navigate('home',event)" class="logo"><div class="logo-mark"><span>UW</span></div><div class="logo-text">Uni-World<small>Services Co.</small></div></a><nav class="nav">${pages.map((p,i)=>`<a href="#/${p==='home'?'':p}" class="${currentPage===p?'active':''}" onclick="navigate('${p}',event)">${labels[i]}</a>`).join('')}<a href="#/contact" class="nav-cta" onclick="navigate('contact',event)">${t('nav_cta')}</a></nav><button class="mobile-toggle" onclick="openMobile()"><span></span><span></span><span></span></button></div></header><div class="mobile-nav" id="mobileNav">${pages.map((p,i)=>`<a href="#/${p==='home'?'':p}" onclick="closeMobile();navigate('${p}',event)">${labels[i]}</a>`).join('')}<button class="mobile-close" onclick="closeMobile()">✕</button></div>`;
}

function renderPage(){
  const pages = {home:pageHome,about:pageAbout,services:pageServices,leadership:pageLeadership,partners:pagePartners,contact:pageContact};

let teamIdx=0;
function slideTeam(dir){
  const track=document.getElementById('teamTrack');
  if(!track)return;
  const total=track.children.length;
  teamIdx=(teamIdx+dir+total)%total;
  track.style.transform=`translateX(-${teamIdx*100}%)`;
  document.querySelectorAll('#teamDots .team-dot').forEach((d,i)=>d.classList.toggle('active',i===teamIdx));
}
function slideTeamTo(i){teamIdx=i;const track=document.getElementById('teamTrack');if(track){track.style.transform=`translateX(-${i*100}%)`;document.querySelectorAll('#teamDots .team-dot').forEach((d,j)=>d.classList.toggle('active',j===i));}}
// Auto-slide team photos
setInterval(()=>{if(document.getElementById('teamTrack'))slideTeam(1);},4000);

let communityIdx = 0;
function slideCommunity(dir){
  const track = document.getElementById('communityTrack');
  if(!track) return;
  const total = track.children.length;
  communityIdx = (communityIdx + dir + total) % total;
  track.style.transform = `translateX(-${communityIdx * 100}%)`;
  updateCommunityDots();
}
function slideCommunityTo(i){
  communityIdx = i;
  const track = document.getElementById('communityTrack');
  if(track) track.style.transform = `translateX(-${i * 100}%)`;
  updateCommunityDots();
}
function updateCommunityDots(){
  for(let i=0;i<5;i++){
    const d = document.getElementById('cdot'+i);
    if(!d) continue;
    d.style.width = i === communityIdx ? '28px' : '10px';
    d.style.borderRadius = i === communityIdx ? '5px' : '50%';
    d.style.background = i === communityIdx ? 'rgba(200,164,90,1)' : 'rgba(200,164,90,.35)';
  }
}
setInterval(()=>{if(document.getElementById('communityTrack'))slideCommunity(1);},5000);

function initEvents(){
  window.addEventListener('scroll', ()=>{
    const h = document.getElementById('mainHeader');
    if(h) h.classList.toggle('scrolled', window.scrollY > 50);
  });
  document.addEventListener('click', (e)=>{
    if(!e.target.closest('.lang-switcher') && langOpen){
      langOpen = false;
      const dd = document.querySelector('.lang-dropdown');
      if(dd) dd.classList.remove('open');
    }
  });
}

function openMobile(){ document.getElementById('mobileNav').classList.add('open'); }
function closeMobile(){ document.getElementById('mobileNav').classList.remove('open'); }

function handleSubmit(e){
  e.preventDefault();
  const msg = document.getElementById('formMsg');
  if(msg){ msg.style.display='block'; msg.textContent = t('form_success'); }
  e.target.reset();
  setTimeout(()=>{ if(msg) msg.style.display='none'; },5000);
}

function initScrollReveal(){
  const obs = new IntersectionObserver((entries)=>{
    entries.forEach(e=>{ if(e.isIntersecting) e.target.classList.add('visible'); });
  },{threshold:.1,rootMargin:'0px 0px -40px 0px'});
  document.querySelectorAll('.reveal').forEach(el=>obs.observe(el));
}

function getCeoImg(size){
  return `<img src="유니월드사진/사용할사진/대표님사진.png" alt="CEO 나정주" style="width:100%;height:100%;object-fit:cover;border-radius:50%;object-position:center 15%">`;
}

function initCeoPhotoClicks(){
  document.querySelectorAll('.ceo-img-upload').forEach(el=>{
    el.onclick = ()=>{
      const inp = document.createElement('input');
      inp.type='file';inp.accept='image/*';
      inp.onchange = (e)=>{
        const file = e.target.files[0];
        if(!file)return;
        const reader = new FileReader();
        reader.onload = (ev)=>{
          ceoPhotoData = ev.target.result;
          try{localStorage.setItem('uw_ceo_photo',ceoPhotoData);}catch(e){}
          render();
        };
        reader.readAsDataURL(file);
      };
      inp.click();
    };
  });
}

// Override render to include ceo photo init
const _origRender = render;
render = function(){
  _origRender();
  initCeoPhotoClicks();
  initHeroLogoClicks();
};

currentPage = parseHash();
render();
